object: detector
alias: DET
name: uvex_lss_detector
description: Two adjacent 4096x4096 CMOS detectors for LSS mode

properties:
  detector: UVEX_CMOS_LSS
  image_plane_id: 0
  dit: "!OBS.dit"
  ndit: "!OBS.ndit"

effects:
  - name: LSS_Detector
    class: DetectorList
    include: True
    kwargs:
      array_dict:
        id: [1]
        pixsize: [0.01] # 10 microns / pix
        angle: [0.]
        gain: [1.2]
        x_cen: [0]
        y_cen: [0]
        x_size: [40.96]
        y_size: [81.92]
      x_cen_unit: mm
      y_cen_unit: mm
      x_size_unit: mm
      y_size_unit: mm
      pixsize_unit: mm
      angle_unit: deg
      gain_unit: electron/adu

  - name: dark_current
    description: CMOS detector dark current
    class: DarkCurrent
    # [e-/s] level of dark current for each detector
    kwargs:
      value: 0.001

#  - name: detector_linearity
#    description: Linearity characteristics of H4RG chips
#    class: LinearityCurve
#    kwargs:
#      filename: tbd.dat

#  - name: shot_noise
#    description: apply poisson shot noise to images
#    class: ShotNoise

  - name: readout_noise
    description: Readout noise frames
    class: BasicReadoutNoise
    kwargs:
      noise_std: 2.0 # e-
